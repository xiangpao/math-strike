<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的世界：数字突击</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <!-- UI Overlays -->
      <div id="main-menu" class="screen active">
        <h1>我的世界：数字突击</h1>
        <div class="character-select">
          <h2>选择你的英雄</h2>
          <div class="characters">
            <div class="char-card selected" data-char="jiejie">
              <div class="char-sprite jiejie"></div>
              <span style="font-weight: bold; color: #FFD700;">桀桀</span>
              <span style="font-size: 0.8rem; color: #ccc;">重型战机<br>30%爆破弹<br>初始+1生命</span>
            </div>
            <div class="char-card" data-char="maijie">
              <div class="char-sprite maijie"></div>
              <span style="font-weight: bold; color: #5D9038;">麦琪</span>
              <span style="font-size: 0.8rem; color: #ccc;">敏捷战机<br>+25%移速<br>双倍磁铁</span>
            </div>
          </div>
        </div>
        <div class="mode-select">
          <button id="btn-story" class="mc-btn">通关模式</button>
          <button id="btn-endless" class="mc-btn">无尽模式</button>
        </div>
      </div>

      <div id="game-hud" class="screen hidden">
        <div class="hud-top">
          <div class="hud-top-left">
            <div class="health-bar" id="health-container">
              <!-- Hearts will be injected here -->
            </div>
            <div class="bomb-bar" id="bomb-container">
              <span class="bomb-label">炸弹:</span>
              <span id="bomb-val">★</span>
              <span class="bomb-hint">[SPACE]</span>
            </div>
          </div>
          <div class="score">分数: <span id="score-val">0</span></div>
        </div>
        <div class="hud-middle">
          <div id="combo-display" class="combo hidden">连击 <span id="combo-val">0</span>!</div>
        </div>
        <div class="hud-bottom">
          <div class="input-display">输入: <span id="input-val">_</span></div>
        </div>
      </div>

      <div id="game-over" class="screen hidden">
        <h2>游戏结束!</h2>
        <div class="final-score">最终分数: <span id="final-score-val">0</span></div>
        <button id="btn-restart" class="mc-btn">返回主菜单</button>
      </div>

      <div id="stage-clear" class="screen hidden">
        <h2>关卡通过!</h2>
        <button id="btn-next-stage" class="mc-btn">下一关</button>
      </div>

      <canvas id="game-canvas"></canvas>

      <!-- Mobile Controls (shown only on touch devices via CSS/JS) -->
      <div id="mobile-controls" class="hidden">
        <!-- Left: Virtual Joystick -->
        <div class="mobile-left">
          <div id="joystick-zone">
            <div id="joystick-base">
              <div id="joystick-knob"></div>
            </div>
          </div>
        </div>

        <!-- Right: Numpad + Action Buttons -->
        <div class="mobile-right">
          <div id="mobile-numpad">
            <button class="num-btn" data-digit="7">7</button>
            <button class="num-btn" data-digit="8">8</button>
            <button class="num-btn" data-digit="9">9</button>
            <button class="num-btn" data-digit="4">4</button>
            <button class="num-btn" data-digit="5">5</button>
            <button class="num-btn" data-digit="6">6</button>
            <button class="num-btn" data-digit="1">1</button>
            <button class="num-btn" data-digit="2">2</button>
            <button class="num-btn" data-digit="3">3</button>
            <button class="num-btn del-btn" id="btn-del">⌫</button>
            <button class="num-btn" data-digit="0">0</button>
            <button class="num-btn fire-btn" id="btn-fire">✓</button>
          </div>
          <button id="btn-bomb-mobile" class="bomb-mobile-btn">💥炸弹</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
